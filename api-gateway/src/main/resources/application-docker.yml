server:
  port: 80

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8080/realms/comparo/protocol/openid-connect/certs

  redis:
    host: redis
    port: 6379

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: ${FRONTEND_URL:http://localhost:4200}
                allowedMethods: "*"
                allowedHeaders: "*"
                allowCredentials: true